name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Format check
        run: |
          test -z "$(gofmt -l . | tee /dev/stderr)"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test Race
        run: go test -race ./...

  ci-success:
    name: Final CI Check
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: All tests passed
        run: echo "Codebase Stable"
