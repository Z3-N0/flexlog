name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: go test ./...

      - name: API compatibility check
        run: go tool gorelease

      - name: Download Tailwind CLI
        env:
          TAILWIND_VERSION: "v4.1.3"
        run: |
          curl -sL "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64" \
            -o tailwindcss
          chmod +x tailwindcss

      - name: Build CSS
        run: ./tailwindcss -i web/static/input.css -o web/static/tailwind.min.css --minify

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.8.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
