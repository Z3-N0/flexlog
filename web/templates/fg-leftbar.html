{{ define "fg-leftbar.html" }}
<div
  id="leftbar"
  x-data="leftbar"
  x-init="initLeftbar()"
  class="flex flex-col flex-none overflow-hidden transition-[width] duration-200 ease-out border-r border-(--border) bg-(--bg-surface) gap-4"
  :class="expanded ? 'w-[220px]' : 'w-12'"
>

  <!-- Header -->
  <div class="flex items-center self-stretch flex-none px-2 pb-6 pt-10 gap-2">
    <span
      x-show="isExpanded()"
      class="grow text-md font-bold tracking-widest uppercase truncate text-(--text-primary)"
    >Flexlog Viewer</span>
    <!-- collapse: visible when fully expanded -->
    <button
      x-show="isExpanded()"
      type="button"
      aria-label="collapse sidebar"
      class="flex items-center justify-center flex-none w-7 h-7 rounded border border-(--border) text-(--text-muted) transition-colors duration-150 hover:text-(--text-primary) hover:border-(--text-muted)"
      @click="collapse()"
    >
      {{ template "icon-chevron-left.svg" }}
    </button>

    <!-- expand: visible when fully collapsed -->
    <button
      x-show="isCollapsed()"
      type="button"
      aria-label="expand sidebar"
      class="flex items-center justify-center flex-none w-7 h-7 rounded border border-(--border) text-(--text-muted) transition-colors duration-150 hover:text-(--text-primary) hover:border-(--text-muted)"
      @click="expand()"
    >
      {{ template "icon-chevron-right.svg" }}
    </button>
  </div>

  <!-- File list -->
  <div x-show="isExpanded()" class="flex flex-col gap-1 px-2 pt-2 pb-4 overflow-y-auto max-h-[60%] border-b border-t border-(--border)">
    {{ range .Files }}
    <label class="flex items-center gap-2 self-stretch flex-none px-2 py-1.5 rounded cursor-pointer transition-colors duration-100 hover:bg-(--bg-raised)">
      <input
        type="checkbox"
        name="file"
        value="{{ . }}"
        checked
        class="flex-none accent-accent"
        @change="onSelectionChange()"
      />
      <span class="truncate text-xs text-(--text-muted)" title="{{ . }}">{{ . }}</span>
    </label>
    {{ end }}

    {{ if not .Files }}
    <p class="px-2 py-2 text-xs text-(--text-muted)">no files found</p>
    {{ end }}
  </div>

  <!-- Spacer pushes apply + toggle to bottom -->
  <div class="grow"></div>

  <!-- Apply button -->
  <div x-show="isExpanded()" class="flex-none px-3 py-3 border-t border-(--border)">
    <button
      type="button"
      class="w-full py-1.5 rounded text-xs font-bold tracking-widest uppercase transition-all duration-150"
      :class="selectionChanged
        ? 'bg-(--accent) text-white cursor-pointer'
        : 'bg-(--bg-raised) text-(--text-muted) cursor-not-allowed opacity-50'"
      :disabled="!selectionChanged"
      @click="
        selectionChanged = false;
        htmx.ajax('GET', '/query?' + new URLSearchParams(
          [...document.querySelectorAll('input[name=file]:checked')].map(el => ['file', el.value])
        ).toString(), { target: '#results-fragment', swap: 'innerHTML' });
      "
    >apply</button>
  </div>

  <!-- Theme toggle -->
  <div class="flex-none flex items-center justify-center px-3 py-3 border-t border-(--border)" x-data="themeChanger" x-init="init()">

    <!-- collapsed: icon only -->
    <button
      x-show="isCollapsed()"
      type="button"
      class="flex items-center justify-center flex-none w-7 h-7 rounded border border-(--border) text-(--text-muted) transition-colors duration-150 hover:text-(--text-primary)"
      :aria-label="isDark ? 'switch to light mode' : 'switch to dark mode'"
      @click="toggle()"
    >
      <span x-show="isDark">{{ template "icon-moon.svg" }}</span>
      <span x-show="!isDark">{{ template "icon-sun.svg" }}</span>
    </button>

    <!-- expanded: sun — switch — moon -->
    <div x-show="isExpanded()" class="flex items-center gap-2">
      <span class="flex-none text-(--text-muted)">{{ template "icon-sun.svg" }}</span>

      <button
        type="button"
        class="relative flex-none w-9 h-5 rounded-full transition-colors duration-200"
        :class="isDark ? 'bg-(--accent)' : 'bg-(--border)'"
        :aria-label="isDark ? 'switch to light mode' : 'switch to dark mode'"
        @click="toggle()"
      >
        <span
          class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform duration-200"
          :class="isDark ? 'translate-x-4' : 'translate-x-0'"
        ></span>
      </button>

      <span class="flex-none text-(--text-muted)">{{ template "icon-moon.svg" }}</span>
    </div>

  </div>

</div>
{{ end }}
