{{ define "pg-layout.html" }}
<div class="flex w-full h-full overflow-hidden">

  {{ template "fg-leftbar.html" .Leftbar }}

  <!-- Main area -->
  <div
    id="inner-fragment"
    class="flex flex-col grow overflow-hidden"

  ></div>
</div>
{{ end }}
