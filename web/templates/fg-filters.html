{{ define "fg-filters.html" }}
<div class="flex flex-col w-full h-full overflow-hidden">

  <!-- Filters bar -->
  <div
    class="flex flex-none items-start gap-3 px-4 py-3 flex-wrap"
    style="border-bottom: 1px solid var(--border); background-color: var(--bg-surface);"
  >

    <!-- Search -->
    <div class="flex flex-col gap-1">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">search</label>
      <input
        type="text"
        name="search"
        placeholder="keyword, trace id..."
        class="px-3 py-1.5 rounded text-xs text-(--text-primary) bg-(--bg-raised) border border-(--border) outline-none transition-colors duration-150 w-56 focus:border-(--accent)"
        x-data
        x-ref="search"
      />
    </div>

    <!-- Level toggles -->
    <div class="flex flex-col gap-1">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">level</label>
      <div class="flex items-center gap-1" x-data="{ levels: [] }">
        <template x-for="lvl in ['TRACE','DEBUG','INFO','WARN','ERROR','FATAL']" :key="lvl">
          <button
            type="button"
            class="px-2 py-1 rounded text-xs font-bold tracking-wider uppercase transition-all duration-150 border"
            :class="levels.includes(lvl) ? 'opacity-100' : 'opacity-40'"
            :style="getLevelStyle(lvl)"
            @click="levels.includes(lvl) ? levels = levels.filter(l => l !== lvl) : levels.push(lvl)"
            x-text="lvl"
          ></button>
        </template>
        <input type="hidden" name="level" :value="levels.join(',')">
      </div>
    </div>

    <!-- From -->
    <div class="flex flex-col gap-1">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">from</label>
      <input
        type="datetime-local"
        name="from"
        class="px-3 py-1.5 rounded text-xs text-(--text-primary) bg-(--bg-raised) border border-(--border) outline-none transition-colors duration-150 focus:border-(--accent)"
      />
    </div>

    <!-- To -->
    <div class="flex flex-col gap-1">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">to</label>
      <input
        type="datetime-local"
        name="to"
        class="px-3 py-1.5 rounded text-xs text-(--text-primary) bg-(--bg-raised) border border-(--border) outline-none transition-colors duration-150 focus:border-(--accent)"
      />
    </div>

    <!-- Show malformed -->
    <div class="flex flex-col gap-1 justify-end pb-0.5">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">malformed</label>
      <label class="flex items-center gap-2 cursor-pointer py-1.5">
        <input
          type="checkbox"
          name="malformed"
          value="true"
          class="flex-none"
          style="accent-color: var(--accent);"
        />
        <span class="text-xs text-(--text-muted)">show</span>
      </label>
    </div>

    <!-- Sort -->
    <div class="flex flex-col gap-1 justify-end pb-0.5" x-data="{ desc: true }">
      <label class="text-xs uppercase tracking-widest text-(--text-muted)">sort</label>
      <button
        type="button"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs border border-(--border) text-(--text-muted) transition-colors duration-150 hover:border-(--accent) hover:text-(--text-primary)"
        @click="desc = !desc"
      >
        <span x-text="desc ? '↓ newest' : '↑ oldest'"></span>
        <input type="hidden" name="desc" :value="desc">
      </button>
    </div>

    <!-- Apply -->
    <div class="flex flex-col gap-1 justify-end pb-0.5 ml-auto">
      <label class="text-xs uppercase tracking-widest opacity-0">apply</label>
      <button
        type="button"
        class="px-4 py-1.5 rounded text-xs font-bold tracking-widest uppercase transition-all duration-150 bg-(--accent) text-white hover:opacity-90"
        @click="applyFilters()"
      >apply</button>
    </div>

  </div>

  <!-- Results -->
  <div
    id="results-fragment"
    class="flex flex-col grow overflow-y-auto"
    data-hx-get="/query"
    data-hx-trigger="load once"
    data-hx-swap="innerHTML"
  ></div>

</div>

<script>
function getLevelStyle(lvl) {
  const colors = {
    TRACE: '#6b6b80', DEBUG: '#4a9eff', INFO: '#34d399',
    WARN: '#fbbf24', ERROR: '#f87171', FATAL: '#dc2626'
  };
  const c = colors[lvl] || '#6b6b80';
  return `color: ${c}; border-color: ${c};`;
}

function applyFilters() {
  const params = new URLSearchParams();

  const search = document.querySelector('input[name="search"]');
  if (search?.value) params.set('search', search.value);

  const levels = document.querySelector('input[name="level"]');
  if (levels?.value) levels.value.split(',').forEach(l => params.append('level', l));

  const from = document.querySelector('input[name="from"]');
  if (from?.value) params.set('from', new Date(from.value).toISOString());

  const to = document.querySelector('input[name="to"]');
  if (to?.value) params.set('to', new Date(to.value).toISOString());

  const malformed = document.querySelector('input[name="malformed"]');
  if (malformed?.checked) params.set('malformed', 'true');

  const desc = document.querySelector('input[name="desc"]');
  if (desc?.value) params.set('desc', desc.value);

  // include checked files from leftbar
  document.querySelectorAll('input[name="file"]:checked')
    .forEach(el => params.append('file', el.value));

  htmx.ajax('GET', '/query?' + params.toString(), {
    target: '#results-fragment',
    swap: 'innerHTML'
  });
}
</script>
{{ end }}
